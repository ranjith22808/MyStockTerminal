function generate() {
    const stock = document.getElementById("stock").value.trim().toUpperCase();
    const type = document.getElementById("promptType").value;
    if (!stock) return alert("Enter stock!");
    
    if (promptTemplates[type]) {
        // This regex replaces any instance of ${stock} in your .txt files
        let template = promptTemplates[type](stock);
        document.getElementById("output").value = template.replace(/\${stock}/g, stock);
    }
}

function copyText() {
    const text = document.getElementById("output");
    text.select();
    document.execCommand("copy");
    alert("Copied!");
}
