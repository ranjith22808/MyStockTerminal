<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestCalc Pro - Premium Edition</title>
    <style>
        :root {
            --accent-orange: #FF5722;
            --accent-blue: #00D2FF;
            --success-green: #00E676;
            --error-red: #FF5252;
            --bg-dark: #0F1216;
            --card-bg: #1C2128;
            --input-bg: #2D333B;
            --text-primary: #FFFFFF;
            --text-secondary: #8B949E;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .calc-card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 28px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 440px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            font-size: 1.5rem;
            margin: 0;
            background: linear-gradient(90deg, var(--accent-orange), #FFD180);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        select, input {
            width: 100%;
            padding: 14px;
            background: var(--input-bg);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus { border-color: var(--accent-blue); box-shadow: 0 0 0 3px rgba(0, 210, 255, 0.1); }

        .section-label {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 12px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .avg-section {
            background: rgba(0,0,0,0.2);
            padding: 18px;
            border-radius: 20px;
            margin-bottom: 20px;
        }

        .avg-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .summary-box {
            background: rgba(0, 210, 255, 0.05);
            padding: 20px;
            border-radius: 20px;
            margin: 20px 0;
            text-align: center;
            border: 1px solid rgba(0, 210, 255, 0.1);
        }

        .data-point {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .avg-highlight {
            display: block;
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--accent-blue);
            margin-top: 5px;
        }

        .profit-card {
            background: white;
            padding: 25px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 20px;
        }

        .profit-card label { color: #666; font-size: 0.8rem; font-weight: 700; display: block; margin-bottom: 5px;}

        #net { font-size: 2.5rem; font-weight: 900; line-height: 1; }
        #percent { font-size: 1.1rem; font-weight: 700; margin-top: 8px; display: block; }

        .charges-split {
            background: rgba(255,255,255,0.03);
            padding: 20px;
            border-radius: 20px;
            border: 1px dashed rgba(255,255,255,0.1);
        }

        .charge-row {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .total-row {
            border-top: 1px solid rgba(255,255,255,0.1);
            margin-top: 10px;
            padding-top: 10px;
            color: white;
            font-weight: 700;
        }

        .positive { color: var(--success-green) !important; }
        .negative { color: var(--error-red) !important; }

    </style>
</head>
<body>

<div class="calc-card">
    <div class="header">
        <h2>InvestCalc Pro</h2>
    </div>

    <div style="margin-bottom: 20px;">
        <span class="section-label">Investment Type</span>
        <select id="type" onchange="calculate()">
            <option value="etf">Silver/Gold BeES (ETF)</option>
            <option value="stock">Equity Stocks (Delivery)</option>
        </select>
    </div>

    <div class="avg-section">
        <span class="section-label" style="color: var(--accent-orange);">Buy History</span>
        <div class="avg-grid">
            <input type="number" id="q1" placeholder="Shares" oninput="updateAverage()">
            <input type="number" id="p1" placeholder="Price (₹)" oninput="updateAverage()">
            <input type="number" id="q2" placeholder="Shares" oninput="updateAverage()">
            <input type="number" id="p2" placeholder="Price (₹)" oninput="updateAverage()">
            <input type="number" id="q3" placeholder="Shares" oninput="updateAverage()">
            <input type="number" id="p3" placeholder="Price (₹)" oninput="updateAverage()">
        </div>
    </div>

    <span class="section-label" style="color: var(--accent-blue);">Market Update</span>
    <input type="number" id="sell" placeholder="Current Market Price (₹)" oninput="calculate()">

    <div class="summary-box">
        <div class="data-point"><span>Total Shares</span> <span id="disp-qty">0</span></div>
        <div class="data-point"><span>Total Investment</span> <span id="disp-invest">₹0.00</span></div>
        <span class="avg-highlight" id="disp-avg">Avg: ₹0.00</span>
    </div>

    <div class="profit-card">
        <label>NET PROFIT / LOSS</label>
        <span id="net" class="negative">₹0.00</span>
        <span id="percent" class="negative">0.00%</span>
    </div>

    <div class="charges-split">
        <span class="section-label" style="color: #FFD180;">Charges Breakdown</span>
        <div class="charge-row"><span>Gross P&L</span> <span id="s-gross">₹0.00</span></div>
        <div class="charge-row"><span>STT / CTT</span> <span id="s-stt">₹0.00</span></div>
        <div class="charge-row"><span>DP Charges (Incl. GST)</span> <span>₹15.93</span></div>
        <div class="charge-row"><span>Exchange Txn</span> <span id="s-nse">₹0.00</span></div>
        <div class="charge-row"><span>SEBI + GST</span> <span id="s-sebi">₹0.00</span></div>
        <div class="charge-row"><span>Stamp Duty</span> <span id="s-stamp">₹0.00</span></div>
        <div class="charge-row total-row"><span>Total Charges</span> <span id="s-total">₹0.00</span></div>
    </div>
</div>

<script>
function updateAverage() {
    let tQty = 0, tVal = 0;
    for (let i = 1; i <= 3; i++) {
        const q = parseFloat(document.getElementById(`q${i}`).value) || 0;
        const p = parseFloat(document.getElementById(`p${i}`).value) || 0;
        tQty += q; tVal += (p * q);
    }
    document.getElementById('disp-qty').innerText = tQty;
    document.getElementById('disp-invest').innerText = "₹" + tVal.toLocaleString(undefined,{minimumFractionDigits:2});
    document.getElementById('disp-avg').innerText = "Avg: ₹" + (tQty > 0 ? (tVal/tQty).toFixed(2) : "0.00");
    calculate();
}

function calculate() {
    let tQty = 0, tVal = 0;
    for (let i = 1; i <= 3; i++) {
        const q = parseFloat(document.getElementById(`q${i}`).value) || 0;
        const p = parseFloat(document.getElementById(`p${i}`).value) || 0;
        tQty += q; tVal += (p * q);
    }
    
    const sellPrice = parseFloat(document.getElementById('sell').value) || 0;
    const type = document.getElementById('type').value;

    if (tQty <= 0 || sellPrice <= 0) return;

    const buyVal = tVal;
    const sellVal = sellPrice * tQty;
    const turnover = buyVal + sellVal;
    const grossProfit = sellVal - buyVal;

    // Based on source 1 & 2 logic
    const stt = (type === 'etf') ? (sellVal * 0.00001) : ((buyVal * 0.001) + (sellVal * 0.001));
    const dp = 15.93; // Fixed including 18% GST
    const nse = (turnover * 0.0000322);
    const sebi = (turnover * 0.000001) * 1.18;
    const stamp = (buyVal * 0.00015);
    const totalCharges = stt + dp + nse + sebi + stamp;
    const netProfit = grossProfit - totalCharges;

    document.getElementById('s-gross').innerText = "₹" + grossProfit.toFixed(2);
    document.getElementById('s-gross').className = "charge-row " + (grossProfit >= 0 ? "positive" : "negative");
    document.getElementById('s-stt').innerText = "₹" + stt.toFixed(2);
    document.getElementById('s-nse').innerText = "₹" + nse.toFixed(2);
    document.getElementById('s-sebi').innerText = "₹" + sebi.toFixed(2);
    document.getElementById('s-stamp').innerText = "₹" + stamp.toFixed(2);
    document.getElementById('s-total').innerText = "₹" + totalCharges.toFixed(2);

    const netEl = document.getElementById('net');
    const perEl = document.getElementById('percent');
    netEl.innerText = (netProfit >= 0 ? "₹" : "- ₹") + Math.abs(netProfit).toLocaleString(undefined,{minimumFractionDigits:2});
    perEl.innerText = (netProfit >= 0 ? "+" : "") + ((netProfit/buyVal)*100).toFixed(2) + "%";
    
    netEl.className = netProfit >= 0 ? "positive" : "negative";
    perEl.className = netProfit >= 0 ? "positive" : "negative";
}
</script>
</body>
</html>
