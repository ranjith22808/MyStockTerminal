<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InvestCalc Pro | Premium Dashboard</title>
    <style>
        :root {
            --primary: #6366f1;
            --accent: #f59e0b;
            --success: #10b981;
            --error: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --input: #334155;
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 460px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .header h2 {
            font-size: 1.2rem;
            margin: 0;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-clear {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.7rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-clear:hover { background: var(--error); color: white; }

        select.type-badge {
            background: var(--input);
            border: 1px solid rgba(255,255,255,0.1);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            width: 100%;
            margin-bottom: 15px;
            cursor: pointer;
        }

        /* Buy History */
        .buy-row {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr 1fr;
            gap: 10px;
            align-items: center;
            background: rgba(0,0,0,0.15);
            padding: 8px 12px;
            border-radius: 14px;
            margin-bottom: 8px;
        }

        input {
            background: var(--input);
            border: 1px solid transparent;
            border-radius: 10px;
            color: white;
            padding: 10px;
            font-size: 0.9rem;
            width: 100%;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--primary); }

        .row-total-label {
            font-size: 0.8rem;
            color: var(--success);
            font-weight: 700;
            text-align: right;
        }

        .label-row {
            display: grid; 
            grid-template-columns: 0.8fr 1.2fr 1fr; 
            padding: 0 12px; 
            font-size: 0.65rem; 
            color: var(--text-muted); 
            font-weight: 800;
            margin-bottom: 5px;
        }

        /* Results Styling */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item {
            background: rgba(255,255,255,0.03);
            padding: 15px;
            border-radius: 18px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .stat-label {
            font-size: 0.65rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 4px;
        }

        .stat-value { font-weight: 800; font-size: 1.2rem; }

        .main-display { text-align: center; padding: 10px 0; }
        #net { font-size: 2.8rem; font-weight: 900; display: block; }
        #percent { 
            font-size: 0.9rem; 
            padding: 5px 15px; 
            border-radius: 20px; 
            font-weight: 800; 
            display: inline-block;
            margin-top: 5px;
        }

        .charges-box {
            background: rgba(0,0,0,0.2);
            border-radius: 18px;
            padding: 15px;
            margin-top: 15px;
        }

        .charge-line {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 6px;
        }

        .charge-line.total {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px dashed rgba(255,255,255,0.1);
            color: var(--text);
            font-weight: 700;
        }

        .positive { color: var(--success) !important; }
        .negative { color: var(--error) !important; }

    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="header">
            <h2>InvestCalc Pro</h2>
            <button class="btn-clear" onclick="clearInputs()">CLEAR ALL</button>
        </div>

        <select id="type" class="type-badge" onchange="calculate()">
            <option value="etf">Silver/Gold BeES (ETF)</option>
            <option value="stock">Equity Delivery (Stocks)</option>
        </select>

        <div class="label-row">
            <span>SHARES</span>
            <span>BUY PRICE (₹)</span>
            <span style="text-align: right;">VALUE</span>
        </div>

        <div id="buy-rows">
            <div class="buy-row">
                <input type="number" id="q1" placeholder="0" oninput="updateAverage()">
                <input type="number" id="p1" placeholder="0.00" oninput="updateAverage()">
                <span id="r1-total" class="row-total-label">₹0</span>
            </div>
            <div class="buy-row">
                <input type="number" id="q2" placeholder="0" oninput="updateAverage()">
                <input type="number" id="p2" placeholder="0.00" oninput="updateAverage()">
                <span id="r2-total" class="row-total-label">₹0</span>
            </div>
            <div class="buy-row">
                <input type="number" id="q3" placeholder="0" oninput="updateAverage()">
                <input type="number" id="p3" placeholder="0.00" oninput="updateAverage()">
                <span id="r3-total" class="row-total-label">₹0</span>
            </div>
            <div class="buy-row">
                <input type="number" id="q4" placeholder="0" oninput="updateAverage()">
                <input type="number" id="p4" placeholder="0.00" oninput="updateAverage()">
                <span id="r4-total" class="row-total-label">₹0</span>
            </div>
        </div>

        <div style="margin-top: 15px;">
            <label class="stat-label" style="color:var(--primary); font-weight: 800;">Current Market Price (CMP)</label>
            <input type="number" id="sell" style="font-size: 1.1rem; border: 1px solid var(--primary); background: rgba(99, 102, 241, 0.05);" placeholder="Enter Live Price..." oninput="calculate()">
        </div>
    </div>

    <div class="card" style="background: linear-gradient(160deg, #1e293b 0%, #0f172a 100%);">
        
        <div class="stats-grid">
            <div class="stat-item" style="border-color: rgba(99, 102, 241, 0.3);">
                <span class="stat-label" style="color: var(--primary);">Avg. Buy Price</span>
                <span id="disp-avg" class="stat-value">₹0.00</span>
            </div>
            <div class="stat-item">
                <span class="stat-label">Total Quantity</span>
                <span id="disp-qty" class="stat-value">0</span>
            </div>
        </div>

        <div class="main-display">
            <span class="stat-label">Net Profit / Loss</span>
            <span id="net" class="negative">₹0.00</span>
            <span id="percent" style="background: rgba(255,255,255,0.05);">0.00%</span>
        </div>

        <div class="charges-box">
            <div class="charge-line"><span>Gross P&L</span> <span id="s-gross">₹0.00</span></div>
            <div class="charge-line"><span>Taxes & Charges</span> <span id="s-total">₹0.00</span></div>
            <div class="charge-line total">
                <span>Break-even Price</span> 
                <span id="breakeven" style="color: var(--accent);">₹0.00</span>
            </div>
        </div>
    </div>
</div>

<script>
function updateAverage() {
    let tQty = 0, tVal = 0;
    for (let i = 1; i <= 4; i++) {
        const q = parseFloat(document.getElementById(`q${i}`).value) || 0;
        const p = parseFloat(document.getElementById(`p${i}`).value) || 0;
        const rowTotal = q * p;
        document.getElementById(`r${i}-total`).innerText = "₹" + Math.round(rowTotal).toLocaleString();
        tQty += q; 
        tVal += rowTotal;
    }
    
    document.getElementById('disp-qty').innerText = tQty.toLocaleString();
    const avg = tQty > 0 ? (tVal/tQty) : 0;
    document.getElementById('disp-avg').innerText = "₹" + avg.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
    calculate();
}

function calculate() {
    let tQty = 0, tVal = 0;
    for (let i = 1; i <= 4; i++) {
        const q = parseFloat(document.getElementById(`q${i}`).value) || 0;
        const p = parseFloat(document.getElementById(`p${i}`).value) || 0;
        tQty += q; tVal += (p * q);
    }
    
    const sellPrice = parseFloat(document.getElementById('sell').value) || 0;
    const type = document.getElementById('type').value;

    if (tQty <= 0 || sellPrice <= 0) {
        resetResults();
        return;
    }

    const buyVal = tVal;
    const sellVal = sellPrice * tQty;
    const turnover = buyVal + sellVal;
    const grossProfit = sellVal - buyVal;

    // Charges Logic (Standard Indian Brokerage Estimates)
    const stt = (type === 'etf') ? (sellVal * 0.0001) : ((buyVal * 0.001) + (sellVal * 0.001));
    const dp = 15.93; 
    const nse = (turnover * 0.0000322);
    const sebi = (turnover * 0.000001) * 1.18;
    const stamp = (buyVal * 0.00015);
    const totalCharges = stt + dp + nse + sebi + stamp;
    const netProfit = grossProfit - totalCharges;

    // Update Profit UI
    const netEl = document.getElementById('net');
    const perEl = document.getElementById('percent');
    
    netEl.innerText = (netProfit >= 0 ? "₹" : "-₹") + Math.abs(netProfit).toLocaleString(undefined,{minimumFractionDigits:2});
    perEl.innerText = (netProfit >= 0 ? "▲ " : "▼ ") + ((netProfit/buyVal)*100).toFixed(2) + "%";
    
    netEl.className = netProfit >= 0 ? "positive" : "negative";
    perEl.style.color = netProfit >= 0 ? "var(--success)" : "var(--error)";
    perEl.style.background = netProfit >= 0 ? "rgba(16, 185, 129, 0.15)" : "rgba(239, 68, 68, 0.15)";

    document.getElementById('s-gross').innerText = "₹" + grossProfit.toLocaleString(undefined,{minimumFractionDigits:2});
    document.getElementById('s-total').innerText = "₹" + totalCharges.toFixed(2);
    
    // Break-even Calculation
    const bePrice = (buyVal + totalCharges) / tQty;
    document.getElementById('breakeven').innerText = "₹" + bePrice.toFixed(2);
}

function clearInputs() {
    for (let i = 1; i <= 4; i++) {
        document.getElementById(`q${i}`).value = '';
        document.getElementById(`p${i}`).value = '';
        document.getElementById(`r${i}-total`).innerText = '₹0';
    }
    document.getElementById('sell').value = '';
    document.getElementById('disp-avg').innerText = '₹0.00';
    document.getElementById('disp-qty').innerText = '0';
    resetResults();
}

function resetResults() {
    document.getElementById('net').innerText = "₹0.00";
    document.getElementById('net').className = "negative";
    document.getElementById('percent').innerText = "0.00%";
    document.getElementById('percent').style.background = "rgba(255,255,255,0.05)";
    document.getElementById('percent').style.color = "var(--text-muted)";
    document.getElementById('s-gross').innerText = "₹0.00";
    document.getElementById('s-total').innerText = "₹0.00";
    document.getElementById('breakeven').innerText = "₹0.00";
}
</script>
</body>
</html>
