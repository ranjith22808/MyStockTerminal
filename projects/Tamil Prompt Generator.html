<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<title>Tamil Prompt Generator Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<style>
body {
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  background: #0f172a;
  color: #e5e7eb;
  padding: 16px;
  margin: 0;
  line-height: 1.5;
}
.container { max-width: 600px; margin: auto; }
h2 { text-align: center; color: #38bdf8; margin-bottom: 20px; }
label { display: block; margin: 12px 0 6px; font-size: 13px; color: #94a3b8; }

input, select, textarea, button {
  width: 100%;
  padding: 12px;
  font-size: 15px;
  border-radius: 8px;
  border: 1px solid #334155;
  box-sizing: border-box;
  outline: none;
}

input, select, textarea {
  background: #020617;
  color: #fff;
}

select { cursor: pointer; }

textarea {
  height: 350px;
  margin-top: 15px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
}

button {
  background: #22c55e;
  color: #022c22;
  font-weight: bold;
  cursor: pointer;
  border: none;
  margin-top: 15px;
  transition: 0.2s;
}
button:hover { opacity: 0.9; }

.copy { background: #38bdf8; margin-top: 8px; }
.btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
.btn-slate { background: #64748b; color: white; }
.btn-gold { background: #f59e0b; color: #451a03; }

footer { text-align: center; margin-top: 20px; font-size: 12px; opacity: 0.6; }
</style>
</head>
<body>

<div class="container">
    <h2>📊 Stock Prompt Master</h2>

    <label>Select Report Type</label>
    <select id="promptType">
        <option value="kavout">Kavout Full Report (Tamil)</option>
        <option value="gemini">16-Point Gemini Analysis (Tamil/Eng)</option>
        <option value="quick">Stock Analysis FULL 25-POINT </option>
        <option value="quick">Quick 5-Point Check (Tamil)</option>
    </select>

    <label>Stock Ticker</label>
    <input id="stock" placeholder="e.g. RELIANCE, TCS, INFY" />

    <button onclick="generate()">Generate Prompt</button>

    <textarea id="output" placeholder="Generated prompt will appear here..."></textarea>

    <button class="copy" onclick="copyText()">📋 Copy Prompt</button>

    <div class="btn-group">
        <button class="btn-slate" onclick="clearAll()">🔄 Clear</button>
        <button class="btn-gold" onclick="downloadPrompt()">💾 Save As Text</button>
    </div>

    <footer>
        Built for Long-term Investors • Cuddalore Finance Tools
    </footer>
</div>

<script>
const promptTemplates = {

- AI Score (1 – 9)

━━━━━━━━━━━━━━━━━━━━
4️⃣ 📈 TECHNICAL ANALYSIS (Tamil)  

Include:

Act like a real financial advisor and explain:

7️⃣ 🏁 FINAL VERDICT (VERY IMPORTANT)  

Give:

- Reason in 3–4 simple Tamil points  
- One-line summary:  
  “இந்த பங்கு ____ வகை முதலீட்டாளர்களுக்கு ஏற்றது.”

Rules:
- Be realistic (no hype targets).  
- Combine both fundamental + technical before verdict.  
- Clearly mention risk.  
- Language must be ** simple Tamil**.  
- Format neatly with headings and tables.
━━━━━━━━━━━━━━━━━━━━
8️⃣ 📱 WHATSAPP INVESTOR SUMMARY (AUTO-GENERATED)

After completing the full analysis above, generate a
“WhatsApp-friendly investor summary” in simple Tamil.

Include only key points:
- 📌 Stock Name & Sector
- 💰 CMP (Current Market Price)
- 📊 P/E Ratio & Valuation view (Cheap / Fair / Expensive)
- 📈 Trend (Bullish / Neutral / Bearish)
- 🧠 Fundamental Strength (High / Medium / Low)
- ⚠️ Risk Level
- 🛒 Buy / Hold / Avoid suggestion
- 🎯 Long-term view (one simple line)

Rules:
- Very short & crisp
- Bullet points only
- No heavy theory
- Suitable for common retail investors
- No hype, realistic tone

End with one clear conclusion line:
“இந்த பங்கு நீண்டகால முதலீட்டுக்கு ____ வகை முதலீட்டாளர்களுக்கு ஏற்றது.”.`,

    // FIXED: Key name changed to 'gemini' for easier coding
    gemini: (stock) => `Please perform a comprehensive 16-point Fundamental and Technical analysis for [${stock}] for a long-term investment horizon.

6. Shareholding: Promoter holding changes and FII/DII interest. Show me in Number

 quick: (stock) => `பங்கு: ${stock}. இந்த பங்கின் 5 முக்கிய விவரங்களை மட்டும் எளிய தமிழில் வழங்கவும்:
Analyze the following company using the FULL 25-POINT professional stock research model.

Company Name: <ENTER COMPANY NAME>

Analyze using:

1. Market Capitalization
2. Total Number of Shares / Equity Structure
3. Shareholding Pattern (Promoter, FII, DII, Public)
4. Revenue / Total Income (last 5 years)
5. Net Profit (last 5 years)
6. EPS Growth (5 years)
7. PE Ratio (vs Industry + Historical)

9. 5-Year & Lifetime Chart Pattern (CAGR, highs/lows, trend strength)

11. Gross NPA / Net NPA (if Bank/NBFC)

23. ROE/ROCE (5-year trend)
24. Working Capital Cycle & Cash Conversion
25. Intrinsic Value (DCF + Graham + Relative Valuation)

Final Output:

- Full 25-point table
- Deep explanation for each point
- Lifetime chart interpretation (easy words)
- Tamil Summary (clear & simple)

,
    quic: (stock) => `பங்கு: ${stock}. இந்த பங்கின் 5 முக்கிய விவரங்களை மட்டும் எளிய தமிழில் வழங்கவும்:
1. தற்போதைய நிலை.
2. லாப வளர்ச்சி (Profit Growth).
3. கடன் அளவு (Debt).

};

function generate() {
    const stockInput = document.getElementById("stock");
    const stock = stockInput.value.trim().toUpperCase();
    const type = document.getElementById("promptType").value;

    if (!stock) {
        alert("Please enter a stock name!");
        return;
    }

    const selectedTemplate = promptTemplates[type];
    
    if (selectedTemplate) {
        document.getElementById("output").value = selectedTemplate(stock);
    } else {
        alert("Template not found!");
    }
}

function copyText() {
    const text = document.getElementById("output");
    if (!text.value) return;
    text.select();
    document.execCommand("copy");
    alert("Copied to clipboard!");
}

function clearAll() {
    if(confirm("Clear everything?")) {
        document.getElementById("stock").value = "";
        document.getElementById("output").value = "";
    }
}

function downloadPrompt() {
    const stock = document.getElementById("stock").value || "Stock";
    const text = document.getElementById("output").value;
    if (!text) return alert("Nothing to save!");

    const blob = new Blob([text], {type: 'text/plain'});
    const elem = window.document.createElement('a');
    elem.href = window.URL.createObjectURL(blob);
    elem.download = `${stock}_Prompt.txt`;
    document.body.appendChild(elem);
    elem.click();
    document.body.removeChild(elem);
}
</script>

</body>
</html>
